# Discord Plugin Configuration
# Tokens can also be set via environment variables:
#   DISCORD_BOT_TOKEN, DISCORD_USER_TOKEN

bot:
  token: ""

user:
  token: ""
  read_only: true

# Allowed server/guild IDs (empty = allow all)
servers: []

defaults:
  message_limit: 100
  insight_limit: 200
  member_sync_limit: 1000

memory:
  auto_save_summaries: true
  auto_save_insights: true
  export_format: "markdown"

persona:
  auto_sync_on_read: false
  track_activity: true

# Alert polling
polling:
  interval_minutes: 15
  auto_analyze_images: true

# Chat bridge — Discord as a chat frontend to Agent Zero
chat_bridge:
  auto_start: false
  # Channels are managed via the discord_chat tool, not config

  # User allowlist: only these Discord user IDs can interact with the bot.
  # Empty list = allow all server members. Get IDs via Discord Developer Mode.
  allowed_users: []

  # Elevated mode: allows authenticated users to access the full Agent Zero
  # agent loop (with tools, code execution, file access, etc.) via Discord.
  # Default is restricted mode (conversation only, no tools).
  allow_elevated: false
  # Auth key for elevated mode. Auto-generated on first use if left empty.
  # Shown in WebUI settings. Required to authenticate via !auth <key> in Discord.
  auth_key: ""
  # Session timeout in seconds (default: 1 hour). Elevated sessions expire
  # after this duration and must be re-authenticated.
  session_timeout: 3600

# Security — prompt injection defense
security:
  max_message_length: 4000
  max_bulk_input_chars: 200000
  sanitize_content: true
  strip_injection_patterns: true
