<html>
<head><title>Discord</title></head>
<body>
    <div x-data x-init="
        if (!config.bot) config.bot = {};
        if (!config.user) config.user = {};
        if (!config.defaults) config.defaults = {};
        if (!config.memory) config.memory = {};
        if (!config.persona) config.persona = {};
        if (!config.polling) config.polling = {};
        if (!config.chat_bridge) config.chat_bridge = {};
        if (!config.security) config.security = {};
        if (config.servers === undefined) config.servers = [];
        if (config.chat_bridge.allowed_users === undefined) config.chat_bridge.allowed_users = [];
    ">
        <template x-if="config">
            <div>
                <!-- Bot Account (Primary) -->
                <div class="section-title">Bot Account (Primary)</div>
                <div class="section-description">
                    Create a bot at <a href="https://discord.com/developers/applications" target="_blank" style="color: #5865F2;">discord.com/developers</a> to get your token. Required for sending messages.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Bot Token</div>
                        <div class="field-description">From the Discord Developer Portal. Required for all write operations.</div>
                    </div>
                    <div class="field-control">
                        <input type="password" x-model="config.bot.token" placeholder="Discord bot token" />
                    </div>
                </div>

                <!-- User Account (Read-Only) -->
                <div class="section-title">User Account (Read-Only)</div>

                <div style="background: var(--bg-warning, #fff3e0); border: 1px solid var(--border-warning, #ffcc80); border-radius: 6px; padding: 10px; margin-bottom: 12px;">
                    <div style="font-size: 11px; color: var(--text-warning, #e65100); line-height: 1.5;">
                        User tokens are gated to read-only operations. Using a user token may violate Discord's Terms of Service. Use at your own risk.
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">User Token (Optional)</div>
                        <div class="field-description">For read-only access to servers the bot cannot join.</div>
                    </div>
                    <div class="field-control">
                        <input type="password" x-model="config.user.token" placeholder="User token for read-only access" />
                    </div>
                </div>

                <!-- Servers -->
                <div class="section-title">Servers</div>
                <div class="section-description">
                    Restrict which Discord servers (guilds) the plugin can access. Leave empty to allow all servers the bot has joined.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Allowed Server IDs</div>
                        <div class="field-description">One server/guild ID per line. Leave empty for all servers.</div>
                    </div>
                    <div class="field-control">
                        <textarea rows="3"
                            :value="(config.servers || []).join('\n')"
                            @input="config.servers = $event.target.value.split('\n').map(s => s.trim()).filter(Boolean)"
                            placeholder="Leave empty for all servers"></textarea>
                    </div>
                </div>

                <!-- Memory -->
                <div class="section-title">Memory</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-save summaries</div>
                        <div class="field-description">Automatically save conversation summaries to agent memory.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory.auto_save_summaries"
                                x-init="if (config.memory.auto_save_summaries === undefined) config.memory.auto_save_summaries = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-save insights</div>
                        <div class="field-description">Automatically save channel insights to agent memory.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory.auto_save_insights"
                                x-init="if (config.memory.auto_save_insights === undefined) config.memory.auto_save_insights = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Persona -->
                <div class="section-title">Persona</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-sync personas on read</div>
                        <div class="field-description">Automatically build user personas when reading messages.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.persona.auto_sync_on_read" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Alert Polling -->
                <div class="section-title">Alert Polling</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Polling interval (minutes)</div>
                        <div class="field-description">How often to check watched channels for new alerts (1-1440 minutes).</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" max="1440" x-model.number="config.polling.interval_minutes"
                            x-init="if (!config.polling.interval_minutes) config.polling.interval_minutes = 15" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-analyze images in alerts</div>
                        <div class="field-description">Automatically analyze image attachments when processing alerts.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.polling.auto_analyze_images"
                                x-init="if (config.polling.auto_analyze_images === undefined) config.polling.auto_analyze_images = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Chat Bridge -->
                <div class="section-title">Chat Bridge</div>
                <div class="section-description">
                    Route Discord messages through Agent Zero's LLM. Requires a bot token. Channels are managed via the <code>discord_chat</code> tool.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-start on agent startup</div>
                        <div class="field-description">Automatically connect the bot when Agent Zero starts (if channels are configured).</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.chat_bridge.auto_start" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">User Allowlist</div>
                        <div class="field-description">Only these Discord users can interact with the bot. Leave empty to allow all server members. Get user IDs by enabling Developer Mode in Discord (Settings > Advanced), then right-click a user > Copy User ID.</div>
                    </div>
                    <div class="field-control">
                        <textarea rows="3"
                            :value="(config.chat_bridge.allowed_users || []).join('\n')"
                            @input="config.chat_bridge.allowed_users = $event.target.value.split('\n').map(s => s.trim()).filter(Boolean)"
                            placeholder="One user ID per line"></textarea>
                    </div>
                </div>

                <!-- Elevated Mode (2FA) -->
                <div class="section-title">Elevated Mode (2FA)</div>
                <div class="section-description">
                    When enabled, authenticated users can unlock full Agent Zero access from Discord using <code>!auth &lt;key&gt;</code>.
                    Default mode is restricted (chat only, no tools).
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Allow elevated mode</div>
                        <div class="field-description">Grants authenticated users full agent access including code execution, file operations, and system tools.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.chat_bridge.allow_elevated" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <template x-if="config.chat_bridge.allow_elevated">
                    <div>
                        <div style="background: var(--bg-warning, #fce4ec); border: 1px solid var(--border-warning, #ef9a9a); border-radius: 6px; padding: 10px; margin-bottom: 12px;">
                            <div style="font-size: 12px; font-weight: 700; color: var(--text-error, #c62828); margin-bottom: 4px;">Security Notice</div>
                            <div style="font-size: 11px; color: var(--text-error, #b71c1c); line-height: 1.5;">
                                Elevated mode grants Discord users <strong>full access</strong> to Agent Zero's capabilities, including code execution, file operations, and system tools.
                                Before enabling, read the security section in the plugin's <strong>README.md</strong>.
                                <br><br>
                                <strong>Recommended:</strong> A private server with only trusted members, a defined User Allowlist above, and short session timeouts. Only allow users you deeply trust.
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Auth Key</div>
                                <div class="field-description">Users send <code>!auth &lt;key&gt;</code> in Discord to elevate. The message is auto-deleted. Share this key securely.</div>
                            </div>
                            <div class="field-control" style="display: flex; gap: 6px; align-items: center;">
                                <input type="text" x-model="config.chat_bridge.auth_key" readonly
                                    style="font-family: monospace; flex: 1;" />
                                <button class="btn btn-field" @click="
                                    (globalThis.fetchApi || fetch)('/api/plugins/discord/discord_config_api', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({action: 'generate_auth_key'})
                                    }).then(r => r.json()).then(d => { if (d.auth_key) config.chat_bridge.auth_key = d.auth_key; })
                                ">Regenerate</button>
                                <button class="btn btn-field" @click="
                                    navigator.clipboard.writeText(config.chat_bridge.auth_key || '').then(() => {
                                        $event.target.textContent = 'Copied!';
                                        setTimeout(() => $event.target.textContent = 'Copy', 2000);
                                    })
                                ">Copy</button>
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Session Timeout</div>
                                <div class="field-description">How long elevated sessions last before requiring re-authentication.</div>
                            </div>
                            <div class="field-control">
                                <select x-model.number="config.chat_bridge.session_timeout"
                                    x-init="if (config.chat_bridge.session_timeout === undefined) config.chat_bridge.session_timeout = 3600">
                                    <option value="3600">1 hour</option>
                                    <option value="7200">2 hours</option>
                                    <option value="14400">4 hours</option>
                                    <option value="28800">8 hours</option>
                                    <option value="43200">12 hours</option>
                                    <option value="86400">24 hours</option>
                                    <option value="0">Never expire</option>
                                </select>
                            </div>
                        </div>

                        <div x-show="config.chat_bridge.session_timeout == 0"
                            style="background: var(--bg-warning, #fff3e0); border: 1px solid var(--border-warning, #ffcc80); border-radius: 6px; padding: 8px; font-size: 11px; color: var(--text-warning, #e65100);">
                            <strong>Security warning:</strong> "Never expire" means an elevated session stays active until the bot restarts or the user runs <code>!deauth</code>. If the auth key is compromised, the attacker retains full agent access indefinitely. Use with caution.
                        </div>
                    </div>
                </template>

                <!-- Security -->
                <div class="section-title">Security</div>
                <div class="section-description">Prompt injection defense settings.</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Sanitize message content</div>
                        <div class="field-description">Strip potentially dangerous content from incoming messages.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.security.sanitize_content"
                                x-init="if (config.security.sanitize_content === undefined) config.security.sanitize_content = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Strip injection patterns</div>
                        <div class="field-description">Remove known prompt injection patterns from messages.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.security.strip_injection_patterns"
                                x-init="if (config.security.strip_injection_patterns === undefined) config.security.strip_injection_patterns = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
