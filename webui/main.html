<div class="discord-dashboard" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color, #e0e0e0);">
        <h3 style="margin: 0; color: #5865F2;">Discord Integration</h3>
        <span id="discord-status" style="padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fce4ec; color: #c62828;">Checking...</span>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px;">
        <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
            <div style="font-size: 20px; font-weight: 700; color: #5865F2;" id="dc-servers">-</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">Servers</div>
        </div>
        <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
            <div style="font-size: 20px; font-weight: 700; color: #5865F2;" id="dc-personas">-</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">Tracked Users</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <button onclick="dcTestConnection()" style="background: #5865F2; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Test Connection</button>
        <button onclick="dcAction('Sync all Discord server members')" style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Sync Members</button>
        <button onclick="dcAction('Show Discord persona registry')" style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">View Registry</button>
    </div>

    <!-- Chat Bridge Section -->
    <div style="padding-top: 12px; border-top: 1px solid var(--border-color, #e0e0e0);">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <h4 style="margin: 0; color: #5865F2;">Chat Bridge</h4>
            <span id="dc-bridge-status" style="padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; background: #f5f5f5; color: #888;">Unknown</span>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button onclick="dcAction('Start the Discord chat bridge')" style="background: #43a047; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Start Bridge</button>
            <button onclick="dcAction('Stop the Discord chat bridge')" style="background: #e53935; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Stop Bridge</button>
            <button onclick="dcAction('Show Discord chat bridge status')" style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Bridge Status</button>
        </div>
    </div>
</div>

<script>
async function dcTestConnection() {
    const badge = document.getElementById('discord-status');
    badge.textContent = 'Testing...';
    badge.style.background = '#fff3e0';
    badge.style.color = '#e65100';
    try {
        const resp = await fetch('/api/plugins/discord/discord_test', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'});
        const data = await resp.json();
        if (data.ok) {
            badge.textContent = 'Connected as ' + data.user;
            badge.style.background = '#e8f5e9';
            badge.style.color = '#2e7d32';
        } else {
            badge.textContent = data.error || 'Error';
            badge.style.background = '#fce4ec';
            badge.style.color = '#c62828';
        }
    } catch (e) {
        badge.textContent = 'API unavailable';
        badge.style.background = '#fce4ec';
        badge.style.color = '#c62828';
    }
}

function dcAction(msg) {
    // Send message to agent chat input if available
    const input = document.querySelector('.chat-input textarea, #chat-input');
    if (input) {
        input.value = msg;
        input.dispatchEvent(new Event('input', { bubbles: true }));
    } else {
        alert('Send to agent: ' + msg);
    }
}

dcTestConnection();
</script>
